<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة معدل الدراسات العليا</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-slate-100">

<div class="container mx-auto px-4 py-8">

<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">

<div class="bg-blue-700 text-white p-6 text-center">

<h1 class="text-3xl font-bold">

حاسبة معدل التقديم للدراسات العليا

</h1>

<p class="mt-2 text-blue-100">

الدبلوم العالي • الماجستير • الدكتوراه

</p>

</div>

<div class="p-8">

<div id="message"
class="hidden mb-5 rounded-lg p-4 text-center font-bold">
</div>

<label class="font-bold mb-2 block">

نوع الدراسة

</label>

<select
id="studyType"
onchange="changeStudy()"
class="w-full border rounded-lg p-3 mb-6">

<option value="master">

الماجستير

</option>

<option value="phd">

الدكتوراه

</option>

</select>

<!-- ========================= -->
<!-- الماجستير -->
<!-- ========================= -->

<div id="masterSection">

<h2 class="text-2xl font-bold text-blue-700 mb-6">

حساب معدل الماجستير

</h2>

<label>

معدل الطالب

</label>

<input
id="studentAverage"
type="number"
min="0"
max="100"
step="0.01"
inputmode="decimal"
oninput="validateNumber(this)"
class="w-full border rounded-lg p-3 mb-4">

<label>

معدل الأول على الدفعة

</label>

<input
id="firstAverage"
type="number"
min="0"
max="100"
step="0.01"
inputmode="decimal"
oninput="validateNumber(this)"
class="w-full border rounded-lg p-3 mb-4">

<label>

درجة الامتحان التنافسي

</label>

<input
id="masterExam"
type="number"
min="0"
max="100"
step="0.01"
inputmode="decimal"
oninput="validateNumber(this)"
class="w-full border rounded-lg p-3 mb-6">

<button
onclick="calculateMaster()"
class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg p-3 text-lg">

احسب معدل المفاضلة

</button>

<div class="bg-slate-100 rounded-lg mt-6 p-5">

<p class="mb-3">

المعدل النسبي :

<span
id="masterRelative"
class="font-bold text-red-600">

0

</span>

</p>

<p>

معدل المفاضلة :

<span
id="masterResult"
class="font-bold text-green-700">

0

</span>

</p>

</div>

</div>
<!-- ========================= -->
<!-- الدكتوراه -->
<!-- ========================= -->

<div id="phdSection" class="hidden">

    <h2 class="text-2xl font-bold text-green-700 mb-6">

        حساب معدل الدكتوراه

    </h2>

    <label>

        معدل الماجستير

    </label>

    <input
        id="masterAverage"
        type="number"
        min="0"
        max="100"
        step="0.01"
        inputmode="decimal"
        oninput="validateNumber(this)"
        class="w-full border rounded-lg p-3 mb-4">

    <label>

        درجة الامتحان التنافسي

    </label>

    <input
        id="phdExam"
        type="number"
        min="0"
        max="100"
        step="0.01"
        inputmode="decimal"
        oninput="validateNumber(this)"
        class="w-full border rounded-lg p-3 mb-6">

    <button
        onclick="calculatePhD()"
        class="w-full bg-green-600 hover:bg-green-700 text-white rounded-lg p-3 text-lg">

        احسب معدل المفاضلة

    </button>

    <div class="bg-slate-100 rounded-lg mt-6 p-5">

        <p>

            معدل المفاضلة :

            <span
                id="phdResult"
                class="font-bold text-green-700">

                0

            </span>

        </p>

    </div>

</div>

<!-- أزرار إضافية -->

<div class="grid grid-cols-2 gap-4 mt-8">

    <button
        onclick="window.print()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg p-3">

        🖨️ طباعة

    </button>

    <button
        onclick="copyResult()"
        class="bg-gray-700 hover:bg-gray-800 text-white rounded-lg p-3">

        📋 نسخ النتيجة

    </button>

</div>

</div>

<div class="bg-gray-100 py-5 text-center text-gray-600">

    جميع الحقوق محفوظة © 2026

    <br>

    Hussein Alaa Al-Zubaidi

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
